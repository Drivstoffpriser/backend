name: Pull Request Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  validate-code-style:
    name: Validate Code Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Check linting
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check types
        run: uv run mypy .

  spell-check:
    name: Validate spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: streetsidesoftware/cspell-action@v6
        with:
          files: "**/*.{py,md}"

  validate-build:
    name: Validate build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t drivstoffpriser-api .

  validate-tests:
    name: Validate tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: drivstoffpriser
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Run tests
        env:
          DB_USER: ci
          DB_PASSWORD: ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: drivstoffpriser
        run: uv run pytest tests
